/* === Anger Eye === */
const eyeCanvas = document.getElementById('angerEye');
const eyeCtx = eyeCanvas.getContext('2d');
let eyeAnger = 0;
let eyeTargetAnger = 0;

function drawAngerEye(anger) {
  eyeCtx.clearRect(0, 0, 40, 40);
  // anger 0-1
  const r = Math.floor(100 + anger * 155);
  const g = Math.floor(80 - anger * 80);
  const b = Math.floor(20 - anger * 20);
  const color = `rgb(${r},${g},${b})`;
  const pupilColor = anger > 0.7 ? '#ff0000' : anger > 0.3 ? '#cc4400' : '#1a1235';
  // White of eye
  eyeCtx.fillStyle = color;
  eyeCtx.fillRect(4, 12, 32, 20);
  // Pupil
  eyeCtx.fillStyle = pupilColor;
  const pupilSize = 6 + Math.floor(anger * 4);
  eyeCtx.fillRect(20 - pupilSize/2, 22 - pupilSize/2, pupilSize, pupilSize);
  // Eyelid (closes with anger)
  const lidHeight = Math.floor(anger * 8);
  eyeCtx.fillStyle = '#0a0a0a';
  eyeCtx.fillRect(4, 12, 32, lidHeight);
  // Border
  eyeCtx.strokeStyle = color;
  eyeCtx.lineWidth = 2;
  eyeCtx.strokeRect(4, 12, 32, 20);
}

function updateAngerUI(level) {
  currentAngerLevel = level;
  const pct = ((level - 1) / 4) * 100;
  const fill = document.getElementById('angerFill');
  fill.style.width = pct + '%';
  const colors = ['#c8a84b', '#e8832a', '#e84a2a', '#c82020', '#8b0000'];
  fill.style.background = colors[level - 1];
  eyeTargetAnger = (level - 1) / 4;
}

function animateEye() {
  eyeAnger += (eyeTargetAnger - eyeAnger) * 0.05;
  drawAngerEye(eyeAnger);
  requestAnimationFrame(animateEye);
}
animateEye();

/* === Wisdom Video Modal === */
let mouthTimer = null;
let currentPortraitUrl = MUDRETS_IMG;
let currentAudioObj = null;

function openWisdomModal(portraitUrl, name, wisdom, audioBase64) {
  currentPortraitUrl = portraitUrl;
  const modal = document.getElementById('wisdomModal');
  document.getElementById('wvPortrait').src = portraitUrl;
  document.getElementById('wvName').textContent = name ? '— ' + name.toUpperCase() + ' —' : '— МУДРЕЦ ПУСТОТЫ —';
  document.getElementById('wvSubtitles').textContent = '';
  document.getElementById('wvSaveBtn').disabled = true;
  document.getElementById('wvSaveBtn').textContent = '⬇ СКАЧАТЬ MP4';
  modal.classList.add('active');

  if (audioBase64) {
    currentAudioObj = new Audio('data:audio/mpeg;base64,' + audioBase64);
    currentAudioObj.onended = () => {
      mouthActive = false;
      resetBars();
      document.getElementById('wvSaveBtn').disabled = false;
    };
    mouthActive = true;
    animateMouth();
    currentAudioObj.play().catch(e => console.log('audio play error', e));
  } else {
    mouthActive = false;
  }

  typeSubtitles(wisdom);
}

function closeWisdomModal() {
  document.getElementById('wisdomModal').classList.remove('active');
  mouthActive = false;
  if (currentAudioObj) { currentAudioObj.pause(); currentAudioObj = null; }
  clearTimeout(mouthTimer);
  resetBars();
}

function resetBars() {
  for (let i = 0; i < 10; i++) {
    const b = document.getElementById('mb'+i);
    if (b) b.style.height = '3px';
  }
}

function animateMouth() {
  if (!mouthActive) { resetBars(); return; }
  for (let i = 0; i < 10; i++) {
    const b = document.getElementById('mb'+i);
    if (!b) continue;
    const h = Math.floor(Math.random() * 26) + 3;
    b.style.height = h + 'px';
  }
  mouthTimer = setTimeout(() => requestAnimationFrame(animateMouth), 90);
}

function typeSubtitles(text) {
  const el = document.getElementById('wvSubtitles');
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    el.scrollTop = el.scrollHeight;
    if (i >= text.length) clearInterval(interval);
  }, 35);
}

/* === TikTok Export === */
async function saveAsTikTok() {
  const btn = document.getElementById('wvSaveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ РЕНДЕР...';

  const W = 1080, H = 1920;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = currentPortraitUrl;
  await new Promise(r => { img.onload = r; img.onerror = r; });

  const wisdom = document.getElementById('wvSubtitles').textContent;
  const name = document.getElementById('wvName').textContent;

  const stream = canvas.captureStream(30);
  const audioBase64 = currentAudio;
  let audioTrack = null;

  if (audioBase64) {
    try {
      const audioCtx = new AudioContext();
      const binary = atob(audioBase64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
      const dest = audioCtx.createMediaStreamDestination();
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(dest);
      src.start();
      audioTrack = dest.stream.getAudioTracks()[0];
      if (audioTrack) stream.addTrack(audioTrack);
    } catch(e) { console.log('audio track error', e); }
  }

  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  const duration = audioBase64 ? Math.ceil(wisdom.length * 0.038 * 1000) + 1500 : 5000;

  recorder.start();

  let startTime = null;
  let charIdx = 0;

  function renderFrame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / duration, 1);

    ctx.fillStyle = '#08080f';
    ctx.fillRect(0, 0, W, H);

    ctx.drawImage(img, 0, 0, W, W);

    for (let y = 0; y < W; y += 4) {
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(0, y, W, 1);
    }

    const borderColor = '#c8a84b';
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, W-8, H-8);

    ctx.fillStyle = '#c8a84b';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(name, W/2, W + 70);

    const eqY = W + 110;
    const bars = 20;
    const barW = 28, gap = 12;
    const totalW = bars * (barW + gap);
    const startX = (W - totalW) / 2;
    for (let i = 0; i < bars; i++) {
      const h = mouthActive ? (Math.random() * 60 + 8) : 8;
      ctx.fillStyle = '#c8a84b';
      ctx.fillRect(startX + i * (barW + gap), eqY + 60 - h, barW, h);
    }

    charIdx = Math.min(Math.floor(progress * wisdom.length * 1.2), wisdom.length);
    const displayText = wisdom.substring(0, charIdx);

    ctx.fillStyle = '#e8c878';
    ctx.font = '48px serif';
    ctx.textAlign = 'center';
    const words = displayText.split(' ');
    let line = '', lines = [], maxW = W - 120;
    for (const word of words) {
      const test = line + word + ' ';
      if (ctx.measureText(test).width > maxW && line) { lines.push(line.trim()); line = word + ' '; }
      else line = test;
    }
    if (line.trim()) lines.push(line.trim());
    const textStartY = eqY + 100;
    lines.forEach((l, i) => ctx.fillText(l, W/2, textStartY + i * 60));

    ctx.fillStyle = '#3a3020';
    ctx.font = '32px monospace';
    ctx.fillText('mudrets.online', W/2, H - 60);

    if (elapsed < duration) requestAnimationFrame(renderFrame);
    else recorder.stop();
  }

  requestAnimationFrame(renderFrame);

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mudrets_wisdom.webm';
    a.click();
    URL.revokeObjectURL(url);
    btn.disabled = false;
    btn.textContent = '⬇ СКАЧАТЬ MP4';
  };
}

/* === Paid Wisdom === */
const usedTxids = new Set();

async function verify() {
  const t = T[lang];
  const txid = document.getElementById('txid').value.trim();
  const btn = document.getElementById('verifyBtn');
  const status = document.getElementById('status');
  const wisdomBox = document.getElementById('wisdomBox');
  const bubble = document.getElementById('bubble');

  if (!txid) { status.className='status error'; status.textContent=t.noTxid; return; }
  if (usedTxids.has(txid)) { status.className='status error'; status.textContent=t.usedTx; return; }

  btn.disabled = true;
  wisdomBox.className = 'wisdom-box';
  document.getElementById('speakBtn').style.display = 'none';
  status.className = 'status checking';
  status.textContent = t.checking;
  bubble.textContent = t.checking;
  bubble.className = 'speech-bubble visible';

  try {
    const res = await fetch(`${BACKEND}/wisdom`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ txid, lang })
    });
    const data = await res.json();

    if (!res.ok) {
      const msg = t.errors[data.error] || t.connErr;
      status.className = 'status error';
      status.textContent = '✗ ' + msg;
      bubble.textContent = msg;
      btn.disabled = false;
      return;
    }

    usedTxids.add(txid);
    currentWisdom = data.wisdom;
    currentAudio = data.audio || null;
    currentPersonaId = data.personaId || null;
    currentPersonaName = data.personaName || null;
    updateAngerUI(data.angerLevel || 1);

    if (data.personaId) showPersona(data.personaId, data.personaName);

    status.className = 'status success';
    status.textContent = t.received(data.amount.toFixed(1));
    document.getElementById('wisdomText').textContent = data.wisdom;
    document.getElementById('t-wisdomLabel').textContent = t.wisdomLabel;
    document.getElementById('t-wisdomLabel').className = 'wisdom-label';
    wisdomBox.className = 'wisdom-box visible';
    document.getElementById('speakBtn').style.display = 'block';
    bubble.textContent = data.wisdom.substring(0, 60) + (data.wisdom.length > 60 ? '...' : '');

    setTimeout(() => speakWisdom(), 800);

  } catch(e) {
    status.className = 'status error';
    status.textContent = t.connErr;
    bubble.textContent = '...';
  }
  btn.disabled = false;
}

/* === Pixel Sage === */
const sc = document.getElementById('sage');
const sx = sc.getContext('2d');
const P = (x,y,w,h,c) => { sx.fillStyle=c; sx.fillRect(x*8,y*8,w*8,h*8); };
function drawSage(eyeOpen, handUp) {
  sx.clearRect(0,0,320,320);
  P(2,9,16,13,'#2d1f5e'); P(2,14,2,8,'#1a1235'); P(16,14,2,8,'#1a1235');
  sx.fillStyle='#c8a84b';
  [[5,11],[10,13],[7,16],[14,12],[4,18],[12,17]].forEach(([x,y])=>sx.fillRect(x*8,y*8,4,4));
  P(3,4,14,7,'#2d1f5e'); P(3,4,14,2,'#1a1235'); P(5,6,10,5,'#2d1f5e'); P(6,6,8,5,'#c8a070');
  sx.fillStyle = eyeOpen ? '#f0e0c0' : '#2d1f5e';
  sx.fillRect(7*8,8*8,8,8); sx.fillRect(11*8,8*8,8,8);
  if(eyeOpen){ sx.fillStyle='#1a1235'; sx.fillRect(8*8,8*8,4,4); sx.fillRect(12*8,8*8,4,4); }
  P(5,11,10,3,'#e8e0c8'); P(6,13,8,2,'#c8c0a8'); P(7,15,6,1,'#a8a090');
  sx.fillStyle='#8a6030'; sx.fillRect(handUp?14*8:15*8,5*8,8,handUp?15*8:13*8);
  sx.fillStyle='#c8a84b'; sx.fillRect((handUp?13:14)*8,4*8,16,8);
  sx.fillStyle='#4bc8c8'; sx.fillRect((handUp?14:15)*8-4,(handUp?4:5)*8-4,16,16);
  sx.fillStyle='rgba(255,255,255,0.4)'; sx.fillRect((handUp?14:15)*8-2,(handUp?4:5)*8-2,4,4);
  P(2,13,2,2,'#c8a070'); P(16,13,2,2,'#c8a070');
  P(3,19,14,3,'#2d1f5e'); P(3,21,2,2,'#4a3880'); P(15,21,2,2,'#4a3880');
}
let bt=0,eo=true,hu=false,fd=1,fy=0,fr=0;
function animateSage() {
  fr++;bt++;
  if(bt>90)eo=false; if(bt>95){eo=true;bt=0;}
  fy+=0.03*fd; if(Math.abs(fy)>1)fd*=-1;
  hu=fr%120>=60;
  sx.save();sx.translate(0,Math.round(fy));drawSage(eo,hu);sx.restore();
  requestAnimationFrame(animateSage);
}
animateSage();

rs();window.addEventListener('resize',rs);
