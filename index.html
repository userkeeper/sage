  .btn { width:100%; background:#c8a84b; color:#0a0a0a; border:none; font-family:'Press Start 2P',monospace; font-size:9px; padding:14px; cursor:pointer; letter-spacing:1px; box-shadow:4px 4px 0 #8a7030; transition: transform 0.08s, box-shadow 0.08s; }
  .btn:hover { transform:translate(-1px,-1px); box-shadow:5px 5px 0 #8a7030; }
  .btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #8a7030; }
  .btn:disabled { background:#3a3020; color:#6a6050; box-shadow:none; cursor:default; transform:none; }

  .status.checking { color:#7a7060; }

  .status.success { color:#4bc8a8; }

  .wisdom-box.visible { display:block; }
  .wisdom-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .wisdom-label { font-size:11px; color:#c8a84b; letter-spacing:1px; }
  .speak-btn { background:none; border:2px solid #c8a84b; color:#c8a84b; font-family:'Press Start 2P',monospace; font-size:7px; padding:5px 9px; cursor:pointer; transition: background 0.1s, color 0.1s; }
  .speak-btn:hover { background:#c8a84b; color:#0a0a0a; }

<body>

<canvas class="stars" id="starfield"></canvas>

<div class="lang-switcher">
  <button class="lang-btn active" onclick="setLang('ru')">РУС</button>
  <button class="lang-btn" onclick="setLang('en')">ENG</button>
</div>

<div class="title" id="t-title">МУДРЕЦ ПУСТОТЫ</div>
<div class="subtitle" id="t-subtitle">Пожертвуй — и узнай то, что лучше бы не знал</div>

<div class="sage-container">
  <canvas id="sage" width="160" height="180"></canvas>
  <div class="speech-bubble" id="bubble">...</div>
</div>

<div class="card">
  <div class="wallet-label" id="t-walletLabel">USDT TRC-20 · КОШЕЛЁК МУДРЕЦА</div>
  <div class="wallet-address" onclick="copyAddr()">TNnCZrgSQwEgWKViC1eci2MxCMdsoqTWVu</div>
  <div class="copy-hint" id="copyHint"></div>
  <hr class="divider">
  <div class="field-label" id="t-fieldLabel">TXID ТРАНЗАКЦИИ (МИНИМУМ 1 USDT)</div>
  <input class="tx-input" id="txid" type="text" spellcheck="false">
  <div class="amount-note"><span class="pixel-coin"></span><span id="t-amountNote"></span></div>
  <button class="btn" id="verifyBtn" onclick="verify()"></button>
  <div class="status" id="status"></div>
  <div class="wisdom-box" id="wisdomBox">
    <div class="wisdom-header">
      <span class="wisdom-label" id="t-wisdomLabel"></span>
      <button class="speak-btn" id="speakBtn" onclick="speakWisdom()" style="display:none">▶ ОЗВУЧИТЬ</button>
    </div>
    <div id="wisdomText"></div>
  </div>
</div>

<div class="footer" id="t-footer"></div>

<script>
const BACKEND = 'https://sage-production-6a45.up.railway.app';
const WALLET = 'TNnCZrgSQwEgWKViC1eci2MxCMdsoqTWVu';
let lang = 'ru';
let currentWisdom = '';

const T = {
  ru: {
    title: 'МУДРЕЦ ПУСТОТЫ',
    subtitle: 'Пожертвуй — и узнай то, что лучше бы не знал',
    walletLabel: 'USDT TRC-20 · КОШЕЛЁК МУДРЕЦА',
    copyHint: '[ нажми чтобы скопировать ]',
    copiedHint: '[ скопировано! ]',
    fieldLabel: 'TXID ТРАНЗАКЦИИ (МИНИМУМ 1 USDT)',
    placeholder: 'вставь хэш транзакции...',
    amountNote: 'мин. 1 USDT · TRON сеть · TRC-20',
    btnText: '▶ ПРОБУДИТЬ МУДРЕЦА',
    checking: '⏳ Мудрец смотрит в блокчейн...',
    noTxid: '⚠ Вставь TXID транзакции',
    usedTx: '⚠ Эта мудрость уже была куплена',
    connErr: '⚠ Ошибка соединения. Попробуй позже.',
    errors: {
      not_found: 'Транзакция не найдена',
      not_confirmed: 'Транзакция не подтверждена',
      no_usdt: 'USDT не найден в транзакции',
      not_usdt: 'Это не USDT TRC-20',
      wrong_address: 'Адрес получателя не совпадает',
      too_little: 'Слишком мало (мин. 1 USDT)',
      already_used: 'Мудрость уже куплена',
      ai_failed: 'Мудрец молчит...',
      server_error: 'Ошибка сервера'
    },
    received: (a) => `✓ ${a} USDT получено`,
    wisdomLabel: '☽ МУДРОСТЬ ПОЛУЧЕНА ☾',
    speakBtn: '▶ ОЗВУЧИТЬ',
    bubbleIdle: 'Брось монету в пустоту...',
    bubbleReading: 'Читаю блокчейн...',
    footer: 'Мудрость не возвращают. Деньги тоже.',
    voiceLang: 'ru-RU'
  },
  en: {
    title: 'THE VOID SAGE',
    subtitle: "Donate — and learn what you'd rather not know",
    walletLabel: "USDT TRC-20 · SAGE'S WALLET",
    copyHint: '[ click to copy ]',
    copiedHint: '[ copied! ]',
    fieldLabel: 'TRANSACTION TXID (MINIMUM 1 USDT)',
    placeholder: 'paste transaction hash...',
    amountNote: 'min. 1 USDT · TRON network · TRC-20',
    btnText: '▶ AWAKEN THE SAGE',
    checking: '⏳ The sage gazes into the blockchain...',
    noTxid: '⚠ Paste your TXID first',
    usedTx: '⚠ This wisdom has already been purchased',
    connErr: '⚠ Connection error. Try again later.',
    errors: {
      not_found: 'Transaction not found',
      not_confirmed: 'Transaction not confirmed',
      no_usdt: 'No USDT found in transaction',
      not_usdt: 'This is not USDT TRC-20',
      wrong_address: 'Wrong recipient address',
      too_little: 'Too little (min. 1 USDT)',
      already_used: 'Wisdom already purchased',
      ai_failed: 'The sage is silent...',
      server_error: 'Server error'
    },
    received: (a) => `✓ ${a} USDT received`,
    wisdomLabel: '☽ WISDOM GRANTED ☾',
    speakBtn: '▶ SPEAK',
    bubbleIdle: 'Cast a coin into the void...',
    bubbleReading: 'Reading the blockchain...',
    footer: 'Wisdom is non-refundable. So is your money.',
    voiceLang: 'en-US'
  }
};

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active',
      (l === 'ru' && b.textContent === 'РУС') ||
      (l === 'en' && b.textContent === 'ENG')
    );
  });
  const t = T[lang];
  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-subtitle').textContent = t.subtitle;
  document.getElementById('t-walletLabel').textContent = t.walletLabel;
  document.getElementById('copyHint').textContent = t.copyHint;
  document.getElementById('t-fieldLabel').textContent = t.fieldLabel;
  document.getElementById('txid').placeholder = t.placeholder;
  document.getElementById('t-amountNote').textContent = t.amountNote;
  document.getElementById('verifyBtn').textContent = t.btnText;
  document.getElementById('t-footer').textContent = t.footer;
  document.getElementById('t-wisdomLabel').textContent = t.wisdomLabel;
  document.getElementById('speakBtn').textContent = t.speakBtn;
  document.getElementById('bubble').textContent = t.bubbleIdle;
  document.getElementById('status').textContent = '';
}

function copyAddr() {
  const t = T[lang];
  navigator.clipboard.writeText(WALLET).then(() => {
    document.getElementById('copyHint').textContent = t.copiedHint;
    setTimeout(() => document.getElementById('copyHint').textContent = t.copyHint, 2000);
  });
}

function speakWisdom() {
  if (!currentWisdom) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(currentWisdom);
  utter.lang = T[lang].voiceLang;
  utter.rate = 0.85;
  utter.pitch = 0.7;
  window.speechSynthesis.speak(utter);
}

const usedTxids = new Set();

async function verify() {
  const t = T[lang];
  const txid = document.getElementById('txid').value.trim();
  const btn = document.getElementById('verifyBtn');
  const status = document.getElementById('status');
  const wisdomBox = document.getElementById('wisdomBox');
  const bubble = document.getElementById('bubble');

  if (!txid) { status.className='status error'; status.textContent=t.noTxid; return; }
  if (usedTxids.has(txid)) { status.className='status error'; status.textContent=t.usedTx; return; }

  btn.disabled = true;
  wisdomBox.className = 'wisdom-box';
  document.getElementById('speakBtn').style.display = 'none';
  status.className = 'status checking';
  status.textContent = t.checking;
  bubble.textContent = t.bubbleReading;
  bubble.className = 'speech-bubble visible';

  try {
    const res = await fetch(`${BACKEND}/wisdom`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ txid, lang })
    });
    const data = await res.json();

    if (!res.ok) {
      const msg = t.errors[data.error] || t.connErr;
      status.className = 'status error';
      status.textContent = '✗ ' + msg;
      bubble.textContent = msg;
      btn.disabled = false;
      return;
    }

    usedTxids.add(txid);
    currentWisdom = data.wisdom;

    status.className = 'status success';
    status.textContent = t.received(data.amount.toFixed(1));
    document.getElementById('wisdomText').textContent = data.wisdom;
    wisdomBox.className = 'wisdom-box visible';
    document.getElementById('speakBtn').style.display = 'block';
    bubble.textContent = data.wisdom.substring(0, 60) + (data.wisdom.length > 60 ? '...' : '');

    setTimeout(() => speakWisdom(), 600);

  } catch(e) {
    status.className = 'status error';
    status.textContent = t.connErr;
    bubble.textContent = '...';
  }
  btn.disabled = false;
}

/* === Pixel Sage === */
const sc = document.getElementById('sage');
const sx = sc.getContext('2d');
const P = (x,y,w,h,c) => { sx.fillStyle=c; sx.fillRect(x*8,y*8,w*8,h*8); };

function drawSage(eyeOpen, handUp) {
  sx.clearRect(0,0,320,320);
  P(2,9,16,13,'#2d1f5e'); P(2,14,2,8,'#1a1235'); P(16,14,2,8,'#1a1235');
  sx.fillStyle='#c8a84b';
  [[5,11],[10,13],[7,16],[14,12],[4,18],[12,17]].forEach(([x,y])=>sx.fillRect(x*8,y*8,4,4));
  P(3,4,14,7,'#2d1f5e'); P(3,4,14,2,'#1a1235'); P(5,6,10,5,'#2d1f5e');
  P(6,6,8,5,'#c8a070');
  sx.fillStyle = eyeOpen ? '#f0e0c0' : '#2d1f5e';
  sx.fillRect(7*8,8*8,8,8); sx.fillRect(11*8,8*8,8,8);
  if(eyeOpen){ sx.fillStyle='#1a1235'; sx.fillRect(8*8,8*8,4,4); sx.fillRect(12*8,8*8,4,4); }
  P(5,11,10,3,'#e8e0c8'); P(6,13,8,2,'#c8c0a8'); P(7,15,6,1,'#a8a090');
  sx.fillStyle='#8a6030'; sx.fillRect(handUp?14*8:15*8, 5*8, 8, handUp?15*8:13*8);
  sx.fillStyle='#c8a84b'; sx.fillRect((handUp?13:14)*8, 4*8, 16, 8);
  sx.fillStyle='#4bc8c8'; sx.fillRect((handUp?14:15)*8-4, (handUp?4:5)*8-4, 16, 16);
  sx.fillStyle='rgba(255,255,255,0.4)'; sx.fillRect((handUp?14:15)*8-2, (handUp?4:5)*8-2, 4, 4);
  P(2,13,2,2,'#c8a070'); P(16,13,2,2,'#c8a070');
  P(3,19,14,3,'#2d1f5e'); P(3,21,2,2,'#4a3880'); P(15,21,2,2,'#4a3880');
}

let bt=0, eo=true, hu=false, fd=1, fy=0, fr=0;
function animateSage() {
  fr++; bt++;
  if(bt>90) eo=false;
  if(bt>95){ eo=true; bt=0; }
  fy += 0.03*fd; if(Math.abs(fy)>1) fd*=-1;
  hu = fr%120 >= 60;
  sx.save(); sx.translate(0, Math.round(fy)); drawSage(eo, hu); sx.restore();
  requestAnimationFrame(animateSage);
}
animateSage();

/* === Stars === */
const stc = document.getElementById('starfield');
const stx = stc.getContext('2d');
function rs(){ stc.width=window.innerWidth; stc.height=window.innerHeight; }
rs(); window.addEventListener('resize', rs);
const stars = Array.from({length:80}, () => ({
  x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
  s: Math.random()*2+1, t: Math.random()*Math.PI*2, sp: 0.005+Math.random()*0.01
}));
function as(){
  stx.clearRect(0,0,stc.width,stc.height);
  stars.forEach(s => {
    s.t += s.sp;
    stx.fillStyle = `rgba(200,168,75,${0.3+0.7*Math.abs(Math.sin(s.t))})`;
    stx.fillRect(Math.floor(s.x), Math.floor(s.y), s.s, s.s);
  });
  requestAnimationFrame(as);
}
as();

setLang('ru');
</script>
</body>
</html>
