<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель управления</title>
<style>
@import url('https://fonts.cdnfonts.com/css/press-start-2p');
@import url('https://fonts.cdnfonts.com/css/vt323');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080f;color:#e8e0c8;font-family:'Press Start 2P',monospace;min-height:100vh;padding:28px 16px;}
.lock{position:fixed;inset:0;background:#08080f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;}
.lock-title{font-size:10px;color:#c8a84b;letter-spacing:3px;}
.lock-input{background:#0d0d1a;border:2px solid #2a2040;color:#e8e0c8;font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 16px;outline:none;width:260px;text-align:center;letter-spacing:4px;}
.lock-input:focus{border-color:#c8a84b;}
.lock-btn{background:#c8a84b;color:#08080f;border:none;font-family:'Press Start 2P',monospace;font-size:8px;padding:12px 24px;cursor:pointer;box-shadow:3px 3px 0 #6a5820;}
.lock-err{font-family:'VT323',monospace;font-size:16px;color:#c84b4b;min-height:20px;}
.main{display:none;max-width:860px;margin:0 auto;}
h1{font-size:clamp(8px,1.4vw,12px);color:#c8a84b;letter-spacing:3px;margin-bottom:4px;}
.sub{font-family:'VT323',monospace;font-size:16px;color:#4a3a5a;margin-bottom:24px;}
.panel{background:#0d0d1a;border:2px solid #2a2040;padding:20px;margin-bottom:16px;}
.panel.gold{border-color:#c8a84b;}
.ptitle{font-size:7px;color:#c8a84b;letter-spacing:2px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1e1e30;}
.personas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;}
.pbtn{background:#0a0a14;border:2px solid #1e1e30;padding:8px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:border-color .15s;}
.pbtn:hover,.pbtn.on{border-color:#c8a84b;}
.pbtn.on{background:#100c03;}
.pbtn img{width:30px;height:30px;object-fit:cover;image-rendering:pixelated;border:1px solid #2a2040;flex-shrink:0;}
.pname{font-family:'VT323',monospace;font-size:13px;color:#7a6a8a;line-height:1.2;}
.pbtn.on .pname{color:#c8a84b;}
.opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;}
.opt label{display:block;font-size:6px;color:#c8a84b;letter-spacing:2px;margin-bottom:8px;}
select{width:100%;background:#0a0a14;border:2px solid #2a2040;color:#e8e0c8;font-family:'VT323',monospace;font-size:16px;padding:8px 10px;outline:none;}
select:focus{border-color:#c8a84b;}
.tones{display:flex;flex-wrap:wrap;gap:4px;}
.tbtn{background:#0a0a14;border:2px solid #1e1e30;color:#5a4a6a;font-family:'VT323',monospace;font-size:13px;padding:5px 10px;cursor:pointer;flex:1;min-width:70px;text-align:center;}
.tbtn:hover,.tbtn.on{border-color:#c8a84b;color:#c8a84b;background:#100c03;}
.anger-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.anger-track{flex:1;height:5px;background:#0d0d1a;border:1px solid #2a2040;overflow:hidden;}
.anger-fill{height:100%;background:#c8a84b;transition:width .4s,background .4s;}
.anger-icons{display:flex;justify-content:space-between;margin-top:3px;font-size:11px;}
input[type=range]{width:100%;accent-color:#c8a84b;}
.genbtn{width:100%;background:#c8a84b;color:#08080f;border:none;font-family:'Press Start 2P',monospace;font-size:9px;padding:15px;cursor:pointer;letter-spacing:1px;box-shadow:4px 4px 0 #6a5820;margin-bottom:12px;}
.genbtn:hover{box-shadow:5px 5px 0 #6a5820;}
.genbtn:disabled{background:#3a3020;color:#6a6050;box-shadow:none;cursor:default;}
.status{font-family:'VT323',monospace;font-size:15px;min-height:22px;text-align:center;margin-bottom:8px;}
.status.ok{color:#4bc8a8;}.status.err{color:#c84b4b;}.status.loading{color:#7a7060;}
.output{background:#0a0a14;border:2px solid #c8a84b;padding:18px;display:none;box-shadow:4px 4px 0 #6a5820;}
.output.vis{display:block;}
.out-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.out-head img{width:56px;height:56px;object-fit:cover;image-rendering:pixelated;border:2px solid #c8a84b;}
.out-persona{font-size:7px;color:#c8a84b;letter-spacing:1px;margin-bottom:3px;}
.out-tone{font-family:'VT323',monospace;font-size:14px;color:#4a3a5a;}
.out-text{font-family:'VT323',monospace;font-size:19px;color:#e8c878;line-height:1.6;border-top:1px solid #2a2040;padding-top:12px;margin-bottom:14px;}
.acts{display:flex;gap:7px;flex-wrap:wrap;}
.abtn{flex:1;min-width:100px;background:transparent;border:2px solid #3a3020;color:#7a6a5a;font-family:'Press Start 2P',monospace;font-size:7px;padding:9px;cursor:pointer;}
.abtn:hover{border-color:#c8a84b;color:#c8a84b;}
.abtn.pri{background:#c8a84b;color:#08080f;border-color:#c8a84b;box-shadow:3px 3px 0 #6a5820;}
.hist-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid #1a1a28;cursor:pointer;}
.hist-item:hover{background:#0d0d1a;}
.hist-item img{width:34px;height:34px;object-fit:cover;image-rendering:pixelated;border:1px solid #2a2040;flex-shrink:0;}
.hname{font-size:6px;color:#c8a84b;margin-bottom:3px;}
.htext{font-family:'VT323',monospace;font-size:14px;color:#6a5a7a;line-height:1.4;}
.htime{font-family:'VT323',monospace;font-size:12px;color:#2a2040;margin-left:auto;flex-shrink:0;}
.hist-empty{font-family:'VT323',monospace;font-size:14px;color:#2a2040;text-align:center;padding:18px;}
.dl-btn{display:block;background:#c8a84b;color:#08080f;font-family:'Press Start 2P',monospace;font-size:8px;padding:14px;text-align:center;text-decoration:none;box-shadow:4px 4px 0 #6a5820;letter-spacing:1px;}
.dl-hint{font-family:'VT323',monospace;font-size:13px;color:#3a2a4a;text-align:center;margin-top:5px;}
</style>
</head>
<body>

<div class="lock" id="lockScreen">
  <div class="lock-title">☽ ВХОД В ПУСТОТУ ☾</div>
  <input class="lock-input" id="lockInput" type="password" placeholder="· · · · · · · ·">
  <button class="lock-btn" id="lockBtn">ВОЙТИ</button>
  <div class="lock-err" id="lockErr"></div>
</div>

<div class="main" id="mainContent">
  <h1>⚙ ПАНЕЛЬ УПРАВЛЕНИЯ</h1>
  <div class="sub">Генератор мудростей на заказ</div>

  <div class="panel gold">
    <div class="ptitle">▸ КОНКУРС — ВИДЕО ДЛЯ СОЦСЕТЕЙ</div>
    <div style="font-family:'VT323',monospace;font-size:16px;color:#7a6a8a;margin-bottom:14px">Видео 9:16 с мудрецом, озвучкой и айфоном. Готово к публикации.</div>
    <a class="dl-btn" href="https://sage-production-6a45.up.railway.app/contest-video" download="mudrets_contest.mp4">⬇ СКАЧАТЬ КОНКУРСНОЕ ВИДЕО</a>
    <div class="dl-hint">генерируется ~15 сек · 1080x1920 · озвучка onyx</div>
  </div>

  <div class="panel">
    <div class="ptitle">▸ ПЕРСОНАЖ</div>
    <div class="personas-grid" id="personasGrid"></div>
  </div>

  <div class="panel">
    <div class="ptitle">▸ НАСТРОЙКИ</div>
    <div class="opts">
      <div class="opt">
        <label>ЯЗЫК</label>
        <select id="langSel">
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="opt">
        <label>ТОН</label>
        <div class="tones" id="toneWrap">
          <button class="tbtn on" data-t="random">Случайный</button>
          <button class="tbtn" data-t="mat">С матом</button>
          <button class="tbtn" data-t="suho">Сухо</button>
          <button class="tbtn" data-t="iron">Ирония</button>
          <button class="tbtn" data-t="calm">Спокойно</button>
        </div>
      </div>
      <div class="opt">
        <label>УРОВЕНЬ ГНЕВА</label>
        <input type="range" id="angerSlider" min="1" max="100" value="1" step="1">
        <div class="anger-row">
          <div class="anger-track"><div class="anger-fill" id="angerFill" style="width:1%"></div></div>
          <span id="angerEmoji" style="font-size:16px">😐</span>
        </div>
        <div class="anger-icons"><span>😐</span><span>😤</span><span>😠</span><span>🔥</span><span>💀</span><span>☠️</span></div>
      </div>
    </div>
  </div>

  <button class="genbtn" id="genBtn">▶ СГЕНЕРИРОВАТЬ МУДРОСТЬ</button>
  <div class="status" id="statusLine"></div>

  <div class="output" id="outputPanel">
    <div class="out-head">
      <img id="outImg" src="" alt="">
      <div>
        <div class="out-persona" id="outPersona"></div>
        <div class="out-tone" id="outTone"></div>
      </div>
    </div>
    <div class="out-text" id="outText"></div>
    <div class="acts">
      <button class="abtn" id="playBtn">▶ ОЗВУЧИТЬ</button>
      <button class="abtn" id="copyBtn">⎘ СКОПИРОВАТЬ</button>
      <button class="abtn pri" id="tgBtn">📤 В TG КАНАЛ</button>
    </div>
  </div>

  <div class="panel" style="margin-top:16px">
    <div class="ptitle">▸ ИСТОРИЯ СЕССИИ</div>
    <div id="historyList"><div class="hist-empty">Пусто</div></div>
  </div>
</div>

<script>
var BACKEND='https://sage-production-6a45.up.railway.app';
var IMG='https://raw.githubusercontent.com/userkeeper/sage/main/personas/';
var TPWD='userkeeper';
var PASS='kissex11%%';
var PERSONAS=[
  {id:'mellstroy',name:'Mellstroy'},{id:'morgenshtern',name:'Моргенштерн'},
  {id:'bratishkin',name:'Братишкин'},{id:'khovansky',name:'Хованский'},
  {id:'litvin',name:'Литвин'},{id:'evelone',name:'Evelone'},
  {id:'buster',name:'Buster'},{id:'zubarefff',name:'Zubarefff'},
  {id:'zloy',name:'Злой'},{id:'gensyxa',name:'Gensyxa'},
  {id:'poperechny',name:'Поперечный'},{id:'egor_kreed',name:'Egor Kreed'},
  {id:'renatko',name:'renatko'},{id:'ivan_zolo',name:'Иван Золо'},
  {id:'anar',name:'Анар'}
];
var TONES={random:{ru:'случайный',en:'random'},mat:{ru:'с матом и злостью',en:'with profanity'},suho:{ru:'сухо и беспощадно',en:'dry and merciless'},iron:{ru:'с иронией',en:'with irony'},calm:{ru:'издевательски спокойно',en:'mockingly calm'}};
var ANGER=[{min:0,e:'😐',c:'#c8a84b'},{min:20,e:'😤',c:'#e8832a'},{min:40,e:'😠',c:'#e84a2a'},{min:60,e:'🔥',c:'#c82020'},{min:80,e:'💀',c:'#8b0000'},{min:95,e:'☠️',c:'#4a0000'}];
var selP=null,selT='random',curW='',curA=null,curPid=null,hist=[];

function getA(v){var r=ANGER[0];for(var i=0;i<ANGER.length;i++){if(v>=ANGER[i].min)r=ANGER[i];}return r;}

function initPanel(){
  var grid=document.getElementById('personasGrid');
  PERSONAS.forEach(function(p){
    var b=document.createElement('button');
    b.className='pbtn';
    b.innerHTML='<img src="'+IMG+p.id+'.png" alt=""><span class="pname">'+p.name+'</span>';
    b.onclick=function(){document.querySelectorAll('.pbtn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');selP=p;};
    grid.appendChild(b);
  });
  document.getElementById('angerSlider').oninput=function(){
    var v=+this.value,a=getA(v);
    document.getElementById('angerFill').style.width=v+'%';
    document.getElementById('angerFill').style.background=a.c;
    document.getElementById('angerEmoji').textContent=a.e;
  };
  document.querySelectorAll('.tbtn').forEach(function(b){
    b.onclick=function(){document.querySelectorAll('.tbtn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');selT=b.dataset.t;};
  });
  document.getElementById('genBtn').onclick=generate;
  document.getElementById('playBtn').onclick=function(){if(curA)new Audio('data:audio/mpeg;base64,'+curA).play();};
  document.getElementById('copyBtn').onclick=function(){
    if(!curW)return;
    navigator.clipboard.writeText(curW);
    var b=document.getElementById('copyBtn');b.textContent='✓ СКОПИРОВАНО';
    setTimeout(function(){b.textContent='⎘ СКОПИРОВАТЬ';},1500);
  };
  document.getElementById('tgBtn').onclick=function(){
    var b=document.getElementById('tgBtn');b.textContent='✓ УЖЕ ОТПРАВЛЕНО';
    setTimeout(function(){b.textContent='📤 В TG КАНАЛ';},2000);
  };
}

async function generate(){
  var btn=document.getElementById('genBtn'),st=document.getElementById('statusLine');
  var lang=document.getElementById('langSel').value;
  var anger=+document.getElementById('angerSlider').value;
  btn.disabled=true;st.className='status loading';st.textContent='⏳ Мудрец смотрит в пустоту...';
  try{
    var r=await fetch(BACKEND+'/wisdom',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({txid:TPWD,lang:lang,forcePersonaId:selP?selP.id:null,forceTone:selT!=='random'?TONES[selT][lang]:null,forceAnger:anger})});
    var d=await r.json();
    if(!r.ok){st.className='status err';st.textContent='✗ '+(d.error||'Ошибка');btn.disabled=false;return;}
    curW=d.wisdom;curA=d.audio||null;curPid=d.personaId||(selP?selP.id:null);
    var pn=d.personaName||(selP?selP.name:'Мудрец Пустоты');
    document.getElementById('outImg').src=curPid?IMG+curPid+'.png':IMG+'mudrets.png';
    document.getElementById('outPersona').textContent=pn.toUpperCase();
    document.getElementById('outTone').textContent=document.getElementById('angerEmoji').textContent+' '+TONES[selT][lang];
    document.getElementById('outText').textContent=d.wisdom;
    document.getElementById('outputPanel').className='output vis';
    st.className='status ok';st.textContent='✓ Мудрость получена';
    hist.unshift({id:curPid,name:pn,text:d.wisdom,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})});
    if(hist.length>20)hist.pop();renderHist();
    if(curA)new Audio('data:audio/mpeg;base64,'+curA).play().catch(function(){});
  }catch(e){st.className='status err';st.textContent='✗ Ошибка соединения';}
  btn.disabled=false;
}

function renderHist(){
  var el=document.getElementById('historyList');
  if(!hist.length){el.innerHTML='<div class="hist-empty">Пусто</div>';return;}
  el.innerHTML=hist.map(function(h){
    return '<div class="hist-item"><img src="'+(h.id?IMG+h.id+'.png':IMG+'mudrets.png')+'" alt=""><div><div class="hname">'+h.name.toUpperCase()+'</div><div class="htext">'+h.text.substring(0,85)+(h.text.length>85?'...':'')+'</div></div><span class="htime">'+h.time+'</span></div>';
  }).join('');
}

var inited=false;
function tryInit(){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainContent').style.display='block';
  if(!inited){initPanel();inited=true;}
}

document.getElementById('lockBtn').onclick=function(){
  if(document.getElementById('lockInput').value===PASS){sessionStorage.setItem('uk','1');tryInit();}
  else{document.getElementById('lockErr').textContent='✗ Неверный пароль';document.getElementById('lockInput').value='';setTimeout(function(){document.getElementById('lockErr').textContent='';},2000);}
};
document.getElementById('lockInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('lockBtn').click();};
if(sessionStorage.getItem('uk')==='1')tryInit();
</script>
</body>
</html>
